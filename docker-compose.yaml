name: pip2va

x-service: &svc
  image: pip2va-base
  build:
    context: .
    dockerfile: docker/base.Dockerfile
  environment:
    PIP2VA_REDIS_URL: redis://redis:6379/0
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    restart: unless-stopped

  timing:
    <<: *svc
    command: python -m pip2va.services.timing.main

  magnet-sim:
    <<: *svc
    command: python -m pip2va.services.magnet_sim.main

  rf-sim:
    <<: *svc
    command: python -m pip2va.services.rf_sim.main

  diag-sim:
    <<: *svc
    command: python -m pip2va.services.diag_sim.main

  mps:
    <<: *svc
    command: python -m pip2va.services.mps.main

  autotune:
    <<: *svc
    command: python -m pip2va.services.autotune.main

  epics-gateway:
    build:
      context: .
      dockerfile: docker/epics-gateway.Dockerfile
    # PVA discovery (UDP 5076 broadcast / TCP 5075) needs host networking
    network_mode: host
    environment:
      PIP2VA_REDIS_URL: redis://localhost:6379/0
      PIP2VA_EPICS_HZ: "10"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  epics-ws:
    build:
      context: .
      dockerfile: docker/epics-ws.Dockerfile
    network_mode: host          # PVA discovery + serves :8085
    environment:
      PIP2VA_REDIS_URL: redis://localhost:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web-gui:
    build:
      context: .
      dockerfile: docker/web-gui.Dockerfile
    environment:
      PIP2VA_REDIS_URL: redis://redis:6379/0
      PIP2VA_OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.pip2va/studies:/root/.pip2va/studies
    ports:
      - "0.0.0.0:6080:6080"
      - "0.0.0.0:6081:6081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  beam-physics:
    build:
      context: .
      dockerfile: docker/beam-physics.Dockerfile
    environment:
      PIP2VA_REDIS_URL: redis://redis:6379/0
      PIP2VA_MACRO_PARTICLES: "400000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
