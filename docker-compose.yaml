name: pip2va

x-service: &svc
  image: pip2va-base
  build:
    context: .
    dockerfile: docker/base.Dockerfile
  environment:
    PIP2VA_REDIS_URL: redis://redis:6379/0
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

# EPICS network configuration — multicast discovery (no broadcast).
# EPICS_HOST_INTERFACE is the local interface NAME (not IP) to send/receive
# multicast on; per-host, set it in .env — e.g. EPICS_HOST_INTERFACE=enP7s7
# (find it with:  ip -o addr show | grep <host-ip> )
x-epics-env: &epics-env
  # ---- CA protocol clients ----
  EPICS_CA_AUTO_ADDR_LIST: "NO"                 # no broadcast search
  EPICS_CA_ADDR_LIST: "239.128.1.6"             # mcast searches
  EPICS_CA_MCAST_TTL: "32"                      # search (and beacon) TTL
  # ---- CA protocol IOC servers ----
  EPICS_CAS_INTF_ADDR_LIST: "239.128.1.6"       # mcast search listen
  EPICS_CAS_AUTO_BEACON_ADDR_LIST: "NO"         # no broadcast beacons
  EPICS_CAS_BEACON_ADDR_LIST: "239.128.1.7"     # send mcast beacons
  # ---- PVA protocol clients ----
  EPICS_PVA_AUTO_ADDR_LIST: "NO"                # no broadcast search
  EPICS_PVA_ADDR_LIST: "239.128.1.6,8@${EPICS_HOST_INTERFACE:-enP7s7}"  # mcast (PVXS)
  # ---- PVA protocol IOC servers ----
  EPICS_PVAS_INTF_ADDR_LIST: "239.128.1.6"      # mcast search listen
  EPICS_PVAS_AUTO_BEACON_ADDR_LIST: "NO"        # no broadcast beacons
  EPICS_PVAS_BEACON_ADDR_LIST: "239.128.1.7"    # send mcast beacons

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    restart: unless-stopped

  timing:
    <<: *svc
    command: python -m pip2va.services.timing.main

  magnet-sim:
    <<: *svc
    command: python -m pip2va.services.magnet_sim.main

  rf-sim:
    <<: *svc
    command: python -m pip2va.services.rf_sim.main

  diag-sim:
    <<: *svc
    command: python -m pip2va.services.diag_sim.main

  mps:
    <<: *svc
    command: python -m pip2va.services.mps.main

  autotune:
    <<: *svc
    command: python -m pip2va.services.autotune.main

  epics-gateway:
    build:
      context: .
      dockerfile: docker/epics-gateway.Dockerfile
    # PVA discovery (UDP 5076 broadcast / TCP 5075) needs host networking —
    # this puts the PVA server directly on the host so remote EPICS clients
    # (pvget, Phoebus, PyDM) connect to <host-ip>:5075/5076 with no mapping.
    network_mode: host
    environment:
      <<: *epics-env
      PIP2VA_REDIS_URL: redis://localhost:6379/0
      PIP2VA_EPICS_HZ: "10"
      PIP2VA_PV_PREFIX: "${PIP2VA_PV_PREFIX:-SPARK}"
    volumes:      # KB + code-RAG index for the SPARK:AI:ASK RPC
      - ${HOME}/.pip2va/studies:/root/.pip2va/studies
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  epics-ws:
    build:
      context: .
      dockerfile: docker/epics-ws.Dockerfile
      args:
        # WEBAPP_MODE=none skips the Flutter build (no 2 GB SDK pull):
        #   WEBAPP_MODE=none docker compose build epics-ws
        WEBAPP_MODE: ${WEBAPP_MODE:-full}
    network_mode: host          # PVA discovery + serves :8085
    environment:
      <<: *epics-env
      PIP2VA_REDIS_URL: redis://localhost:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web-gui:
    build:
      context: .
      dockerfile: docker/web-gui.Dockerfile
    environment:
      PIP2VA_REDIS_URL: redis://redis:6379/0
      PIP2VA_OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.pip2va/studies:/root/.pip2va/studies
    ports:
      - "0.0.0.0:6080:6080"
      - "0.0.0.0:6081:6081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  beam-physics:
    build:
      context: .
      dockerfile: docker/beam-physics.Dockerfile
    environment:
      PIP2VA_REDIS_URL: redis://redis:6379/0
      PIP2VA_MACRO_PARTICLES: "400000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
